<div class="estadisticas-wrapper">

    <h1>📊 Estadísticas</h1>

    <div class="filtros">
        <div class="filtro-campo">
            <label>Desde</label>
            <input type="date" [(ngModel)]="desde">
        </div>
        <div class="filtro-campo">
            <label>Hasta</label>
            <input type="date" [(ngModel)]="hasta">
        </div>
        <button (click)="cargarGraficos()" style="width:auto; padding: 7px 16px; font-size:13px; align-self:flex-end;">
            Filtrar
        </button>
    </div>

    <div class="graficos-grid">
        <div class="grafico-card">
            <h2>Publicaciones por usuario</h2>
            <canvas #graficoPubUsuario></canvas>
        </div>
        <div class="grafico-card">
            <h2>Comentarios por día</h2>
            <canvas #graficoComentariosDia></canvas>
        </div>
        <div class="grafico-card">
            <h2>Comentarios por publicación</h2>
            <canvas #graficoComentariosPub></canvas>
        </div>
    </div>

</div>
