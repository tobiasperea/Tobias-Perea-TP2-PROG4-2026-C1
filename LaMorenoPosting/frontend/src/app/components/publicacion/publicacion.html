<div class="publicacion-card">

    <h3>{{ publicacion.titulo }}</h3>

    <p>{{ publicacion.descripcion }}</p>

    <p>
        Likes: {{ publicacion.likes.length }}
    </p>

    <button *ngIf="!tieneLike()" (click)="darLike()">

        ❤️ Like

    </button>

    <button *ngIf="tieneLike()" (click)="quitarLike()">

        💔 Quitar Like

    </button>

    <button (click)="eliminar()">
        🗑️ Eliminar
    </button>

</div>
